<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 500 380" width="500" height="380">
  <g id="diagram" fill="none" stroke="none">
    <title>Pythagoras' theorem on a right-angled triangle</title>

    <!-- Right triangle: right angle at bottom-left -->
    <g id="triangle">
      <!-- Fill -->
      <path d="M 80 280 L 320 280 L 80 80 Z" fill="#bae1ff" stroke="none"/>
      <!-- Stroke -->
      <path d="M 80 280 L 320 280 L 80 80 Z" stroke="#2d2d2d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Right-angle square marker -->
      <rect x="80" y="260" width="20" height="20" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Side labels -->
      <!-- leg a (vertical) -->
      <text x="60" y="185" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">a</text>
      <!-- leg b (horizontal) -->
      <text x="200" y="308" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">b</text>
      <!-- hypotenuse c (diagonal) -->
      <text x="220" y="165" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">c</text>

      <!-- Right-angle indicator -->
      <text x="105" y="272" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="10" fill="#686868">90°</text>
    </g>

    <!-- Formula box -->
    <g id="formula-box">
      <rect x="30" y="325" width="440" height="40" rx="6" fill="#baffc9" stroke="#2d2d2d" stroke-width="2"/>
      <text x="250" y="350" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">c² = a² + b²</text>
    </g>
  </g>
</svg>
