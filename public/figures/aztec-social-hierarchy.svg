<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 500 380" width="500" height="380">
  <g id="diagram" fill="none" stroke="none">
    <title>Aztec social hierarchy</title>

    <!-- Title -->
    <text x="250" y="28" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">Aztec Social Hierarchy</text>

    <!-- Tier 1: Huey Tlatoani -->
    <g id="tier-tlatoani">
      <rect x="175" y="45" width="150" height="40" rx="4" fill="#bae1ff"/>
      <rect x="175" y="45" width="150" height="40" rx="4" stroke="#2d2d2d" stroke-width="2"/>
      <text x="250" y="70" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">Huey Tlatoani</text>
    </g>

    <!-- Arrow down -->
    <line x1="250" y1="85" x2="250" y2="105" stroke="#686868" stroke-width="2"/>

    <!-- Tier 2: Nobles (Pipiltin) -->
    <g id="tier-nobles">
      <rect x="120" y="110" width="260" height="50" rx="4" fill="#ffdfba"/>
      <rect x="120" y="110" width="260" height="50" rx="4" stroke="#2d2d2d" stroke-width="2"/>
      <text x="250" y="131" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">Nobles (Pipiltin)</text>
      <text x="250" y="148" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="10" fill="#686868">Priests, military commanders, judges, officials</text>
    </g>

    <!-- Arrow down -->
    <line x1="250" y1="160" x2="250" y2="180" stroke="#686868" stroke-width="2"/>

    <!-- Tier 3: Warriors / Merchants -->
    <g id="tier-warriors">
      <rect x="80" y="185" width="340" height="50" rx="4" fill="#ffffba"/>
      <rect x="80" y="185" width="340" height="50" rx="4" stroke="#2d2d2d" stroke-width="2"/>
      <text x="250" y="206" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">Elite Warriors and Merchants</text>
      <text x="250" y="223" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="10" fill="#686868">Eagle and Jaguar warriors, long-distance traders (pochteca)</text>
    </g>

    <!-- Arrow down -->
    <line x1="250" y1="235" x2="250" y2="255" stroke="#686868" stroke-width="2"/>

    <!-- Tier 4: Commoners (Macehualtin) -->
    <g id="tier-commoners">
      <rect x="40" y="260" width="420" height="50" rx="4" fill="#baffc9"/>
      <rect x="40" y="260" width="420" height="50" rx="4" stroke="#2d2d2d" stroke-width="2"/>
      <text x="250" y="281" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">Commoners (Macehualtin)</text>
      <text x="250" y="298" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="10" fill="#686868">Farmers, artisans, labourers — organised into calpulli (clans)</text>
    </g>

    <!-- Arrow down -->
    <line x1="250" y1="310" x2="250" y2="330" stroke="#686868" stroke-width="2"/>

    <!-- Tier 5: Slaves (Tlacotin) -->
    <g id="tier-slaves">
      <rect x="130" y="335" width="240" height="35" rx="4" fill="#ffb3ba"/>
      <rect x="130" y="335" width="240" height="35" rx="4" stroke="#2d2d2d" stroke-width="2"/>
      <text x="250" y="356" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">Slaves (Tlacotin)</text>
    </g>
  </g>
</svg>
