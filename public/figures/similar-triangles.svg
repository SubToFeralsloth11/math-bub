<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 650 320" width="650" height="320">
  <defs>
    <marker id="arrowhead" orient="auto" overflow="visible" markerUnits="strokeWidth" viewBox="-1 -3 7 6" markerWidth="7" markerHeight="6">
      <path d="M 4.8 0 L 0 0 M 0 -1.8 L 4.8 0 L 0 1.8" fill="none" stroke="#2d2d2d" stroke-width="1"/>
    </marker>
  </defs>
  <g id="diagram" fill="none" stroke="none">
    <title>Similar triangles with scale factor</title>

    <!-- Small triangle ABC -->
    <g id="triangle-small">
      <!-- Fill -->
      <path d="M 30 260 L 110 260 L 70 140 Z" fill="#bae1ff" stroke="none"/>
      <!-- Stroke -->
      <path d="M 30 260 L 110 260 L 70 140 Z" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Angle arcs -->
      <!-- Angle A (left) -->
      <path d="M 42 240 A 16 16 0 0 1 36 226" stroke="#2d2d2d" stroke-width="1"/>
      <!-- Angle B (right) -->
      <path d="M 98 240 A 16 16 0 0 0 104 226" stroke="#2d2d2d" stroke-width="1"/>
      <!-- Angle C (top) -->
      <path d="M 60 150 L 66 160 L 74 150" stroke="#2d2d2d" stroke-width="1"/>

      <!-- Side labels -->
      <text x="70" y="286" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">3</text>
      <text x="22" y="225" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">2</text>
      <text x="118" y="225" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">2.5</text>

      <!-- Vertex labels -->
      <text x="16" y="278" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">A</text>
      <text x="124" y="278" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">B</text>
      <text x="70" y="128" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">C</text>
    </g>

    <!-- Scale factor arrow and label -->
    <text x="210" y="200" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="22" fill="#2d2d2d">k = 3</text>
    <line x1="160" y1="210" x2="250" y2="210" marker-end="url(#arrowhead)" stroke="#686868" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Large triangle DEF -->
    <g id="triangle-large">
      <!-- Fill -->
      <path d="M 280 260 L 520 260 L 400 20 Z" fill="#baffc9" stroke="none"/>
      <!-- Stroke -->
      <path d="M 280 260 L 520 260 L 400 20 Z" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Angle arcs (matching) -->
      <!-- Angle D (left) -->
      <path d="M 296 240 A 16 16 0 0 1 288 226" stroke="#2d2d2d" stroke-width="1"/>
      <!-- Angle E (right) -->
      <path d="M 504 240 A 16 16 0 0 0 512 226" stroke="#2d2d2d" stroke-width="1"/>
      <!-- Angle F (top) -->
      <path d="M 380 50 L 386 60 L 394 50" stroke="#2d2d2d" stroke-width="1"/>

      <!-- Side labels (3x the small triangle) -->
      <text x="400" y="286" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">9</text>
      <text x="272" y="180" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">6</text>
      <text x="528" y="160" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">7.5</text>

      <!-- Vertex labels -->
      <text x="264" y="278" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">D</text>
      <text x="536" y="278" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">E</text>
      <text x="400" y="8" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">F</text>
    </g>

    <!-- Key property -->
    <text x="400" y="310" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">Corresponding angles are equal. Corresponding sides are proportional (×3).</text>
  </g>
</svg>
