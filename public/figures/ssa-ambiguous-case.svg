<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 700 340" width="700" height="340">
  <defs>
    <marker id="arrowhead" orient="auto" overflow="visible" markerUnits="strokeWidth" viewBox="-1 -3 7 6" markerWidth="7" markerHeight="6">
      <path d="M 4.8 0 L 0 0 M 0 -1.8 L 4.8 0 L 0 1.8" fill="none" stroke="#2d2d2d" stroke-width="1"/>
    </marker>
  </defs>
  <g id="diagram" fill="none" stroke="none">
    <title>SSA ambiguous case - why it fails</title>

    <!-- Given: side AB = 6, side BC = 4.5, angle A = 30° for both triangles -->
    <!-- Triangle 1 (steep) -->
    <g id="triangle1">
      <!-- Fill -->
      <path d="M 60 260 L 260 260 L 120 120 Z" fill="#ffb3ba" stroke="none"/>
      <!-- Stroke -->
      <path d="M 60 260 L 260 260 L 120 120 Z" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Side labels -->
      <!-- AB = 6 -->
      <text x="160" y="286" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="12" fill="#1a1a1a">AB = 6</text>
      <!-- BC = 4.5 -->
      <text x="205" y="200" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="12" fill="#1a1a1a">BC = 4.5</text>

      <!-- Angle arc at A (30°) -->
      <path d="M 78 242 A 20 20 0 0 1 70 222" stroke="#2d2d2d" stroke-width="1.5"/>
      <text x="58" y="228" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">30°</text>

      <!-- Vertex labels -->
      <text x="40" y="280" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">A</text>
      <text x="280" y="280" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">B</text>
      <text x="120" y="108" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">C₁</text>
    </g>

    <!-- "versus" -->
    <text x="340" y="195" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#2d2d2d">Same SSA conditions</text>
    <text x="340" y="215" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="12" fill="#686868">yet two different triangles!</text>

    <!-- Triangle 2 (shallow) -->
    <g id="triangle2">
      <!-- Fill -->
      <path d="M 430 260 L 610 260 L 520 200 Z" fill="#ffdfba" stroke="none"/>
      <!-- Stroke -->
      <path d="M 430 260 L 610 260 L 520 200 Z" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Side labels -->
      <!-- AB = 6 -->
      <text x="520" y="286" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="12" fill="#1a1a1a">AB = 6</text>
      <!-- BC = 4.5 -->
      <text x="575" y="238" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="12" fill="#1a1a1a">BC = 4.5</text>

      <!-- Angle arc at A (30°) -->
      <path d="M 448 242 A 20 20 0 0 1 440 222" stroke="#2d2d2d" stroke-width="1.5"/>
      <text x="428" y="228" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="11" fill="#1a1a1a">30°</text>

      <!-- Vertex labels -->
      <text x="410" y="280" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">A</text>
      <text x="630" y="280" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">B</text>
      <text x="520" y="188" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">C₂</text>
    </g>

    <!-- Footer text -->
    <text x="350" y="325" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="13" fill="#1a1a1a">SSA is NOT a valid congruence test — two different triangles can share two sides and a non-included angle.</text>
  </g>
</svg>
