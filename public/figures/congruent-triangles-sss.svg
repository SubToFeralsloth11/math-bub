<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <marker id="arrowhead" orient="auto" overflow="visible" markerUnits="strokeWidth" viewBox="-1 -3 7 6" markerWidth="7" markerHeight="6">
      <path d="M 4.8 0 L 0 0 M 0 -1.8 L 4.8 0 L 0 1.8" fill="none" stroke="#2d2d2d" stroke-width="1"/>
    </marker>
  </defs>
  <g id="diagram" fill="none" stroke="none">
    <title>Congruent triangles by SSS</title>

    <!-- Triangle ABC (left) -->
    <g id="triangle-abc">
      <!-- Fill -->
      <path d="M 60 240 L 260 240 L 160 60 Z" fill="#bae1ff" stroke="none"/>
      <!-- Stroke -->
      <path d="M 60 240 L 260 240 L 160 60 Z" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Tick marks AB (bottom) -->
      <line x1="120" y1="248" x2="140" y2="242" stroke="#2d2d2d" stroke-width="1.5"/>
      <line x1="180" y1="248" x2="200" y2="242" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Tick marks BC (right side) -->
      <line x1="252" y1="190" x2="244" y2="205" stroke="#2d2d2d" stroke-width="1.5"/>
      <line x1="252" y1="150" x2="244" y2="165" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Tick marks AC (left side) -->
      <line x1="68" y1="190" x2="76" y2="205" stroke="#2d2d2d" stroke-width="1.5"/>
      <line x1="68" y1="150" x2="76" y2="165" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Vertex labels -->
      <text x="40" y="260" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">A</text>
      <text x="280" y="260" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">B</text>
      <text x="160" y="48" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">C</text>
    </g>

    <!-- Equals sign between triangles -->
    <text x="300" y="155" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="32" fill="#2d2d2d">≅</text>

    <!-- Triangle PQR (right) -->
    <g id="triangle-pqr">
      <!-- Fill -->
      <path d="M 330 240 L 530 240 L 430 60 Z" fill="#baffc9" stroke="none"/>
      <!-- Stroke -->
      <path d="M 330 240 L 530 240 L 430 60 Z" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Tick marks PQ (bottom) -->
      <line x1="390" y1="248" x2="410" y2="242" stroke="#2d2d2d" stroke-width="1.5"/>
      <line x1="450" y1="248" x2="470" y2="242" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Tick marks QR (right side) -->
      <line x1="522" y1="190" x2="514" y2="205" stroke="#2d2d2d" stroke-width="1.5"/>
      <line x1="522" y1="150" x2="514" y2="165" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Tick marks PR (left side) -->
      <line x1="338" y1="190" x2="346" y2="205" stroke="#2d2d2d" stroke-width="1.5"/>
      <line x1="338" y1="150" x2="346" y2="165" stroke="#2d2d2d" stroke-width="1.5"/>

      <!-- Vertex labels -->
      <text x="310" y="260" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">P</text>
      <text x="550" y="260" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">Q</text>
      <text x="430" y="48" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="16" fill="#1a1a1a">R</text>
    </g>

    <!-- SSS label below -->
    <text x="300" y="300" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="bold" font-size="14" fill="#1a1a1a">SSS: All three pairs of corresponding sides are equal.</text>
  </g>
</svg>
